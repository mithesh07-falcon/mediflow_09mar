name: mediflow_mobile
description: "A Flutter application for the Elder People Portal and Caregiver Portal in the MediFlow ecosystem."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  
  # Backend & Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.9
  
  # Voice & Speech
  speech_to_text: ^6.4.1
  flutter_tts: ^3.8.3
  dialog_flowtter: ^0.3.3 # For custom NLP mapping or Dialogflow
  
  # Computer Vision & AI
  tflite_v2: ^1.0.0 # Community version of tflite
  google_ml_kit: ^0.16.2
  image_picker: ^1.0.5
  
  # Vitals & Health
  health: ^10.0.1
  geolocator: ^10.1.0
  
  # UI/UX & Utilities
  google_fonts: ^6.1.0
  url_launcher: ^6.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  
  # API Integration
  http: ^1.1.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/yolov8_pills.tflite
    - assets/models/labels.txt
    - assets/images/pill_placeholder.png
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
